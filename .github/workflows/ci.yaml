name: Gosub Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust_version: [ stable, nightly, 1.73.0 ]
        os: [ ubuntu-latest ]
#        rust_version: [ stable, beta, nightly, 1.73.0, "stable minus 1 release", "stable minus 2 releases" ]
#        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust_version }}
          cache-targets: "false"
      - name: Build
        run: cargo build --verbose --all --all-features

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust_version: [ stable, nightly, 1.73.0 ]
        os: [ ubuntu-latest ]
#        rust_version: [ stable, beta, nightly, 1.73.0, "stable minus 1 release", "stable minus 2 releases" ]
#        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Print CPU info
        run: lscpu
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust_version }}
          cache-targets: "false"
      - name: Run tests
        run: cargo test --verbose --all --no-fail-fast --all-features --all-targets

  clippy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust_version: [ stable, nightly ]
        os: [ ubuntu-latest ]
#        rust_version: [ stable, beta, nightly, 1.73.0, "stable minus 1 release", "stable minus 2 releases" ]
#        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.rust_version }}
          cache-targets: "false"
      - name: Run Clippy
        run: cargo clippy --all --tests -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
          cache-targets: "false"
      - name: Run fmt
        run: cargo fmt --check --all
